# ==============================================================================
# Render.com - Infrastructure as Code
# ==============================================================================
# Ce fichier définit l'infrastructure complète sur Render
# Documentation: https://render.com/docs/infrastructure-as-code

services:
  # ==============================================================================
  # SERVICE WEB DJANGO (Docker)
  # ==============================================================================
  - type: web
    name: traitdunion-web
    runtime: docker
    region: frankfurt  # Plus proche de la Guyane via l'Europe
    plan: starter  # Passer à "standard" pour plus de RAM (PDF generation)
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    # Pre-deploy command (Docker runtime: buildCommand is ignored, use preDeployCommand)
    preDeployCommand: chmod +x build.sh && ./build.sh
    
    # Health check — use dedicated endpoint (exempt from canonical redirect)
    healthCheckPath: /healthz/
    
    # Headers HTTP — Empêcher le CDN Render de mettre en cache les pages HTML
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, must-revalidate
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=3600
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400
    
    # Variables d'environnement
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: traitdunion.it,www.traitdunion.it,.onrender.com
      - key: CANONICAL_DOMAIN
        value: www.traitdunion.it
      - key: SITE_URL
        value: https://www.traitdunion.it
      - key: CSRF_TRUSTED_ORIGINS
        value: https://traitdunion.it,https://www.traitdunion.it,https://*.onrender.com
      
      # Base de données (lien automatique)
      - key: DATABASE_URL
        fromDatabase:
          name: traitdunion-db
          property: connectionString
      
      # Brevo API (à configurer manuellement dans le dashboard Render)
      - key: BREVO_API_KEY
        sync: false  # Secret à définir manuellement
      
      # Email
      - key: DEFAULT_FROM_EMAIL
        value: contact@traitdunion.it
      - key: DEFAULT_FROM_NAME
        value: "Trait d'Union Studio"
      - key: ADMIN_EMAIL
        value: admin@traitdunion.it
      - key: TASK_NOTIFICATION_EMAIL
        value: info@traitdunion.it
      
      # Stripe (à configurer manuellement - SECRETS)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      
      # reCAPTCHA (à configurer manuellement)
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false

      # Cloudflare Turnstile (à configurer manuellement)
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_FALLBACK_TIMEOUT_MS
        value: "2500"
      
      # Superuser initial (optionnel)
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@traitdunion.it
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

      # Avis Google Business (synchro automatique) — SECRETS
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACE_ID
        sync: false
      - key: GOOGLE_REVIEWS_LANGUAGE
        value: fr

  # ==============================================================================
  # CRON — Synchronisation des avis Google Business (toutes les 6 h)
  # ==============================================================================
  - type: cron
    name: traitdunion-sync-google-reviews
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "0 */6 * * *"  # toutes les 6 heures
    dockerCommand: python manage.py sync_google_reviews
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: traitdunion-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACE_ID
        sync: false
      - key: GOOGLE_REVIEWS_LANGUAGE
        value: fr

  # ==============================================================================
  # CRON — Audit portfolio (Ch.05 : performance / sécurité / SSL) — 1× / semaine
  # ==============================================================================
  - type: cron
    name: traitdunion-audit-portfolio
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "0 4 * * 1"  # tous les lundis à 04h00 (SSL Labs étant lent)
    dockerCommand: python manage.py audit_portfolio_projects
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: traitdunion-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PAGESPEED_API_KEY
        sync: false

  # ==============================================================================
  # CRON — Renvoi des rapports simulateur non livrés (filet de sécurité) — /15 min
  # ==============================================================================
  - type: cron
    name: traitdunion-resend-reports
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "*/15 * * * *"  # toutes les 15 minutes
    dockerCommand: python manage.py resend_unsent_simulator_reports
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: traitdunion-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SITE_URL
        value: https://www.traitdunion.it
      - key: DEFAULT_FROM_EMAIL
        value: contact@traitdunion.it
      - key: DEFAULT_FROM_NAME
        value: "Trait d'Union Studio"
      - key: BREVO_API_KEY
        sync: false  # Secret à définir manuellement (même valeur que le web)

  # ==============================================================================
  # BASE DE DONNÉES POSTGRESQL
  # ==============================================================================
databases:
  - name: traitdunion-db
    region: frankfurt
    plan: starter  # 1 GB, backups quotidiens
    databaseName: traitdunion
    user: tus_admin
    ipAllowList: []  # Connexion interne uniquement

# ==============================================================================
# NOTES DE DÉPLOIEMENT
# ==============================================================================
# 
# 1. PREMIÈRE INSTALLATION :
#    - Forkez/clonez ce repo
#    - Connectez-le à Render via "New Blueprint"
#    - Configurez BREVO_API_KEY manuellement dans Environment
#
# 2. DNS (Hostinger) :
#    - CNAME www -> [votre-service].onrender.com
#    - A @ -> IP de Render (voir dashboard)
#    - Ou utiliser les custom domains de Render
#
# 3. POUR LE STOCKAGE S3/R2 (médias) :
#    Ajoutez ces variables manuellement :
#    - AWS_ACCESS_KEY_ID
#    - AWS_SECRET_ACCESS_KEY
#    - AWS_STORAGE_BUCKET_NAME
#    - AWS_S3_ENDPOINT_URL (pour Cloudflare R2)
#
# 4. REDIS (optionnel, pour cache/sessions) :
#    Ajoutez un service Redis dans le dashboard et liez REDIS_URL
#
# 5. WEASYPRINT (génération PDF) :
#    Sur Render, les dépendances système (pango, cairo) sont déjà disponibles
#    Si problèmes, utilisez un Dockerfile custom
