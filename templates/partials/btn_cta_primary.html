<!-- Bouton CTA Primary Premium - Composant réutilisable -->
<a href="{{ url }}" class="group relative inline-flex items-center justify-center px-10 py-5 overflow-hidden rounded-2xl transition-all duration-micro ease-standard hover:scale-[0.98] active:scale-95 btn-glow">
    <!-- Outer glow permanent -->
    <span class="absolute -inset-1 bg-gradient-to-r from-tus-blue via-cyan-400 to-tus-blue rounded-2xl blur-md opacity-40 group-hover:opacity-60 transition-opacity duration-micro ease-standard"></span>
    <!-- Fond principal -->
    <span class="absolute inset-0 bg-gradient-to-r from-tus-blue to-[#1a4aff] rounded-2xl transition-colors duration-micro ease-standard group-hover:from-[#1a4aff] group-hover:to-tus-blue"></span>
    <!-- Text + icon -->
    <span class="relative z-10 flex items-center gap-3">
        <span class="font-display font-bold text-lg text-tus-white">{{ text }}</span>
        <svg class="w-5 h-5 text-tus-white group-hover:translate-x-1 transition-transform duration-micro ease-standard" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
    </span>
</a>
