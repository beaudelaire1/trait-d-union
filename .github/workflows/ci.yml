name: CI — Trait d'Union Studio

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: sqlite:///db.sqlite3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest pytest-django flake8

      - name: Lint (flake8)
        run: flake8 apps/ config/ core/ services/ --max-line-length=120 --exclude=migrations

      - name: Django checks
        run: python manage.py check --settings=config.settings.test

      - name: Run migrations
        run: python manage.py migrate --settings=config.settings.test

      - name: Collect static files
        run: python manage.py collectstatic --noinput --settings=config.settings.test

      - name: Run tests
        run: python -m pytest -v --tb=short
