<!DOCTYPE html>
<html lang="fr">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#07080A;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#07080A;padding:40px 20px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#0D1016;border:1px solid rgba(246,247,251,0.08);border-radius:16px;overflow:hidden;">

  <!-- Header gradient -->
  <tr><td style="height:4px;background:linear-gradient(135deg,#0B2DFF 0%,#22C55E 100%);"></td></tr>

  <!-- Logo -->
  <tr><td style="padding:32px 40px 8px;text-align:center;">
    <span style="font-size:1.4rem;font-weight:700;color:#F6F7FB;letter-spacing:0.02em;">Trait d'Union Studio</span>
    <p style="margin:4px 0 0;font-size:0.75rem;color:rgba(246,247,251,0.4);text-transform:uppercase;letter-spacing:0.15em;">Chroniques & Insights</p>
  </td></tr>

  <!-- Subject -->
  <tr><td style="padding:16px 40px 8px;">
    <h1 style="margin:0;font-size:1.5rem;font-weight:700;color:#F6F7FB;line-height:1.3;">{{ subject }}</h1>
  </td></tr>

  <!-- Body content -->
  <tr><td style="padding:16px 40px 32px;">
    <div style="font-size:0.95rem;color:rgba(246,247,251,0.85);line-height:1.75;">
      {{ body_content|safe }}
    </div>
  </td></tr>

  <!-- CTA -->
  <tr><td style="padding:0 40px 32px;text-align:center;">
    <a href="{{ site_url }}/chroniques/" style="display:inline-block;background:linear-gradient(135deg,#0B2DFF,#22C55E);color:#fff;text-decoration:none;padding:14px 40px;border-radius:8px;font-weight:700;font-size:0.95rem;">
      Lire nos derniers articles →
    </a>
  </td></tr>

  <!-- Footer -->
  <tr><td style="padding:24px 40px;border-top:1px solid rgba(246,247,251,0.08);text-align:center;">
    <p style="margin:0 0 8px;font-size:0.78rem;color:rgba(246,247,251,0.35);">
      Trait d'Union Studio · 258 Av Justin Catayée, 97300 Cayenne, Guyane<br>
      <a href="mailto:contact@traitdunion.it" style="color:#4D6FFF;text-decoration:none;">contact@traitdunion.it</a>
    </p>
    <p style="margin:0;font-size:0.7rem;color:rgba(246,247,251,0.25);">
      Vous recevez cet email car vous êtes inscrit à notre newsletter.<br>
      <a href="{{ unsubscribe_url }}" style="color:rgba(246,247,251,0.4);text-decoration:underline;">Se désinscrire</a>
    </p>
  </td></tr>

</table>
</td></tr>
</table>
</body>
</html>
